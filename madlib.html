<div id="welcomeScreen" style="text-align: center;">
<h1>Mad Lib Game</h1>
<p>
Write your own funny story! Just enter any word that comes to mind, as long as it matches the requested part of speech
</p>
<button onclick="startQuiz()">Start Game</button>
</div>

<div id="quizContainer" style="text-align: center; display: none;">

<h2 id="question"></h2>

<input id="answerInput" type="text" placeholder="Enter your answer">

<br><br>

<button id="b1" onclick="checkAnswer()">Submit Answer</button>

<p id="feedback"></p>


</div>
</body>

<script>
        let currentQuestion = 0;
        function startQuiz(){
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("quizContainer").style.display = "block";
            loadQuestion();
        }

        function loadQuestion(){
            let partOfSpeech = ["adjective","noun","verb"]
            document.getElementById("question").innerText = "Give me a/an "+partOfSpeech[currentQuestion%3];
        }
        let answers = [];
        function checkAnswer(){

            let userAnswer = document.getElementById("answerInput").value;
            answers.push(userAnswer);

            document.getElementById("answerInput").value = "";

            currentQuestion++;
            if (currentQuestion<6){
                loadQuestion();
            }if (currentQuestion===6){
                document.getElementById("question").innerText = "One day, a very "+answers[0]+" "+answers[1]+" was getting ready to "+answers[2]+" to the "+answers[3]+" "+answers[4]+", when he saw a car about to "+ answers[5]+" him.";
                document.getElementById("b1").textContent="reset";
            }if (currentQuestion===7){
                location.reload();
            }
            

        }
</script>
</html>
